<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfólio{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        nav {
            background: #1a1a2e;
            padding: 0.8rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.88rem;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            transition: background 0.2s;
        }
        nav a:hover { background: #16213e; color: #fff; }
        nav .brand { color: #4ecca3; font-weight: bold; font-size: 1.05rem; margin-right: auto; }
        .container { max-width: 1150px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 1.7rem; margin-bottom: 1.5rem; color: #1a1a2e; border-left: 4px solid #4ecca3; padding-left: 0.75rem; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #1a1a2e; color: #fff; padding: 0.85rem 1rem; text-align: left; font-weight: 600; font-size: 0.9rem; }
        td { padding: 0.7rem 1rem; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0faf7; }
        .badge {
            display: inline-block;
            background: #4ecca3;
            color: #1a1a2e;
            border-radius: 12px;
            padding: 0.15rem 0.6rem;
            font-size: 0.78rem;
            font-weight: 600;
            margin: 0.1rem;
        }
        .badge-gray { background: #e0e0e0; color: #555; }
        .empty { text-align: center; color: #888; padding: 2rem; font-style: italic; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'portfolio:index' %}" class="brand">🎓 Portfólio</a>
        <a href="{% url 'portfolio:tecnologias' %}">Tecnologias</a>
        <a href="{% url 'portfolio:projetos' %}">Projetos</a>
        <a href="{% url 'portfolio:tfcs' %}">TFCs</a>
        <a href="{% url 'portfolio:eventos' %}">Eventos</a>
        <a href="{% url 'portfolio:competencias' %}">Competências</a>
        <a href="{% url 'portfolio:formacoes' %}">Formações</a>
        <a href="{% url 'portfolio:ucs' %}">UCs</a>
        <a href="{% url 'portfolio:licenciaturas' %}">Licenciaturas</a>
        <a href="{% url 'portfolio:docentes' %}">Docentes</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
