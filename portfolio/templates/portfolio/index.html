{% extends 'portfolio/base.html' %}
{% block title %}Portfólio — Início{% endblock %}

{% block content %}
<h1>Bem-vindo ao meu Portfólio</h1>
<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap:1.2rem; margin-top:1rem;">
    {% for label, count in stats %}
    <div style="background:#fff; border-radius:10px; padding:1.5rem; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
        <div style="font-size:2.2rem; font-weight:bold; color:#4ecca3;">{{ count }}</div>
        <div style="color:#555; margin-top:0.4rem; font-size:0.92rem;">{{ label }}</div>
    </div>
    {% endfor %}
</div>
{% endblock %}
