{% extends 'portfolio/base.html' %}
{% block title %}Docentes{% endblock %}
{% block content %}
<h1>{{ titulo }}</h1>
<table>
    <thead>
        <tr><th>#</th><th>Nome</th><th>Título</th><th>Email</th></tr>
    </thead>
    <tbody>
        {% for d in docentes %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td><strong>{{ d.nome }}</strong></td>
            <td><span class="badge badge-gray">{{ d.titulo }}</span></td>
            <td><a href="mailto:{{ d.email }}" style="color:#1a1a2e;">{{ d.email }}</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="empty">Nenhum docente registado.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
